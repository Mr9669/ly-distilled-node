name: Heartbeat Cron

on:
  schedule:
    - cron: '*/5 * * * *'  # Run every 5 minutes via GitHub Actions
  workflow_dispatch:  # Allow manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel heartbeat endpoint
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://ly-distilled-node.vercel.app/api/
          echo "Heartbeat sent"
      
      - name: Retry on failure
        if: failure()
        run: |
          sleep 10
          curl -s -o /dev/null -w "Retry: HTTP %{http_code}\n" \
            https://ly-distilled-node.vercel.app/api/
