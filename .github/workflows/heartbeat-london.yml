# heartbeat-london.yml — GH Actions变体: London区域标记
name: Distilled Node Heartbeat - London

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Heartbeat (London)
        env:
          LY_HB_URL: ${{ secrets.LY_HB_URL }}
          LY_HB_KEY: ${{ secrets.LY_HB_KEY }}
          LY_NODE_ID: gh-actions-london
          LY_SIGN_KEY: ${{ secrets.LY_SIGN_KEY }}
          LY_REGION: eu-west-2
        run: python3 api/index.py

      - name: Debug (on failure)
        if: failure()
        run: |
          echo "NODE_ID: gh-actions-london"
          echo "REGION: eu-west-2"
